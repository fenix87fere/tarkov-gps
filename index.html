<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS - Streets of Tarkov</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div id="mapa"></div>

  <div id="panel">
    <h3>🎯 GPS Tarkov</h3>
    <div id="instrucciones">
      <p>1️⃣ Clic en el mapa → <b style="color:#0f0">INICIO</b></p>
      <p>2️⃣ Clic en el mapa → <b style="color:#f44">DESTINO</b></p>
      <p>3️⃣ La ruta se calcula sola</p>
    </div>
    <div id="info-ruta"></div>
    <div class="botones">
      <button id="btn-reiniciar">🗑️ Reiniciar</button>
      <button id="btn-nodos">🔵 Ver nodos</button>
    </div>
    <p class="nota">💡 "Ver nodos" muestra el grafo de calles</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
